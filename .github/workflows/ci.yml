name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only: this workflow only runs the local gates, it never writes to the repo.
permissions:
  contents: read

jobs:
  check:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Min supported (engines: node >=20.12) + current LTS.
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm test

      - run: npm run build
